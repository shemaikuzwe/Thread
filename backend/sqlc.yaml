version: "2"
sql:
  - schema: "sql/schema"
    queries: "sql/queries"
    engine: "postgresql"
    gen:
      go:
        out: "internal/database"
        emit_json_tags: true
        overrides:
          - db_type: "pg_catalog.varchar" # varchar in pg
            nullable: true
            go_type:
              type: "*string"
          - column: "channels.name"
            go_type:
              type: "*string"
          - db_type: "text"
            nullable: true # this overrides default sql.NullString
            go_type:
              type: "*string"
          - db_type: "boolean"
            nullable: true # this overrides default sql.NullString
            go_type:
              type: "*bool"
