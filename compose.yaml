services:
  postgres:
    image: postgres:14-alpine
    ports:
      - "5555:5432"
    env_file:
      - .env
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    image: gomicro/goose:latest
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: user=${DB_USER} password=${DB_PASSWORD} dbname=${DB_NAME} host=postgres port=5432 sslmode=disable
      GOOSE_MIGRATION_DIR: /schema
    volumes:
      - ./apps/chat-server/sql/schema:/schema
    command: goose up

  redis:
    image: redis:7-alpine
    ports:
      - "6333:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=8000

  chat-server:
    build:
      context: ./apps/chat-server
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PORT=8001

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - NODE_ENV=production

volumes:
  postgres_data:
  redis_data:
    driver: local
