services:
  postgres:
    image: postgres:14-alpine
    ports:
      - "5555:5432"
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    image: gomicro/goose:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: user=${DB_USER} password=${DB_PASSWORD} dbname=${DB_NAME} host=postgres port=5432 sslmode=disable
      GOOSE_MIGRATION_DIR: /schema
    volumes:
      - ./apps/chat-server/sql/schema:/schema
    command: goose up

  redis:
    image: redis:7-alpine
    ports:
      - "6333:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./apps/api/.env.example
    environment:
      - PORT=8000
      - CLIENT_APP_URL=http://localhost:3000
      - AUTH_SECRET=super-secret
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
      - REDIS_URL=redis://redis:6379

  chat-server:
    build:
      context: ./apps/chat-server
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./apps/chat-server/.env.example
    environment:
      - PORT=8001
      - CLIENT_APP_URL=http://localhost:3000
      - AUTH_SECRET=super-secret
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
      - REDIS_URL=redis://redis:6379

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
      chat-server:
        condition: service_started
    env_file:
      - ./apps/web/.env

volumes:
  postgres_data:
  redis_data:
    driver: local
