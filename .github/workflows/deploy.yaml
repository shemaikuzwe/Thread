name: Deploy
on:
  workflow_run:
    workflows: ['Build']
    branches: ['main']
    types:
      - completed

permissions:
  contents: read

jobs:
  build-and-push-image:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_BASE_URL: ${{ vars.NEXT_PUBLIC_BASE_URL }}
      NEXT_PUBLIC_PORTAL_BASE_URL: ${{ vars.NEXT_PUBLIC_PORTAL_BASE_URL }}
      NEXT_PUBLIC_PORTAL_API_KEY: ${{ secrets.NEXT_PUBLIC_PORTAL_API_KEY }}
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: ./apps/api/Dockerfile
            tags: |
              ${{vars.ECR_DOMAIN}}/api:latest
              ${{vars.ECR_DOMAIN}}/api:${{ github.sha }}
            build_args: |
              TURBO_TEAM=${{ env.TURBO_TEAM }}
              TURBO_TOKEN=${{ env.TURBO_TOKEN }}
          - name: web
            dockerfile: ./apps/web/Dockerfile
            tags: |
              ${{vars.ECR_DOMAIN}}/web:latest
              ${{vars.ECR_DOMAIN}}/web:${{ github.sha }}
            build_args: |
              TURBO_TEAM=${{ env.TURBO_TEAM }}
              TURBO_TOKEN=${{ env.TURBO_TOKEN }}
              NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
              NEXT_PUBLIC_BASE_URL=${{ env.NEXT_PUBLIC_BASE_URL }}
              NEXT_PUBLIC_PORTAL_BASE_URL=${{ env.NEXT_PUBLIC_PORTAL_BASE_URL }}
              NEXT_PUBLIC_PORTAL_API_KEY=${{ env.NEXT_PUBLIC_PORTAL_API_KEY }}
              NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL }}
              NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ vars.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          - name: chat-service
            dockerfile: ./apps/chat-service/Dockerfile
            tags: |
              ${{vars.ECR_DOMAIN}}/chat-service:latest
              ${{vars.ECR_DOMAIN}}/chat-service:${{ github.sha }}
            build_args: |
              TURBO_TEAM=${{ env.TURBO_TEAM }}
              TURBO_TOKEN=${{ env.TURBO_TOKEN }}
          - name: notification-service
            dockerfile: ./apps/notification/Dockerfile
            tags: |
              ${{vars.ECR_DOMAIN}}/notification:latest
              ${{vars.ECR_DOMAIN}}/notification:${{ github.sha }}
            build_args: |
              TURBO_TEAM=${{ env.TURBO_TEAM }}
              TURBO_TOKEN=${{ env.TURBO_TOKEN }}
          - name: ws-server
            dockerfile: ./apps/ws-server/Dockerfile
            context: ./apps/ws-server
            tags: |
              ${{vars.ECR_DOMAIN}}/ws-server:latest
              ${{vars.ECR_DOMAIN}}/ws-server:${{ github.sha }}
            build_args: ""
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Inject ESC environment variables
        uses: pulumi/esc-action@v1
        with:
          environment: ${{ vars.ORG_NAME }}/thread/prod
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context || '.' }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: ${{ matrix.tags }}
  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-and-push-image
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Inject ESC environment variables
        uses: pulumi/esc-action@v1
        with:
          environment: ${{ vars.ORG_NAME }}/thread/prod
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - uses: pnpm/action-setup@v4

      - name: Install infra dependencies
        run: pnpm install
        working-directory: infra

      - name: Pulumi up
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: ${{ vars.ORG_NAME }}/thread/prod
          work_dir: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
