name: Pulumi Pull Request
on:
  pull_request:
    paths:
      - 'infra/**'
permissions:
  id-token: write
  contents: read
  pull-requests: write 
jobs:
  preview:
    name: Preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v4
      - name: Debug OIDC claims
        run: |
          token=$(curl -sH "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=urn:pulumi:org:shemaikuzwe-org" \
            | jq -r .value)

          python3 - "$token" <<'PY'
          import base64, json, sys
          token = sys.argv[1]
          payload = token.split(".")[1]
          payload += "=" * (-len(payload) % 4)
          print(json.dumps(json.loads(base64.urlsafe_b64decode(payload)), indent=2))
          PY
      - name: Authenticate with Pulumi Cloud
        uses: pulumi/auth-actions@v1
        with:
          organization: ${{ vars.ORG_NAME }}
          requested-token-type: urn:pulumi:token-type:access_token:organization
      - name: Inject ESC environment variables
        uses: pulumi/esc-action@v1
        with:
          environment: ${{ vars.ORG_NAME }}/thread/prod
      - run: pnpm install
        working-directory: infra
      - uses: pulumi/actions@v6
        with:
          command: preview
          stack-name: ${{ vars.ORG_NAME }}/thread
          comment-on-pr: true
          work-dir: infra
          github-token: ${{ secrets.GITHUB_TOKEN }}
