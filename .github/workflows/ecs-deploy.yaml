name: ECS Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pulumi/setup-pulumi@v2

      - uses: docker/setup-buildx-action@v3

      - name: Read Pulumi outputs
        id: pulumi
        working-directory: infra
        env:
          ORG_NAME: ${{ vars.ORG_NAME }}
          PULUMI_STACK: ${{ vars.PULUMI_STACK || 'dev' }}
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          STACK="${ORG_NAME}/${PULUMI_STACK}"
          OUTPUTS=$(pulumi stack output --stack "$STACK" --json)

          echo "cluster=$(echo "$OUTPUTS" | jq -r '.ecsClusterName')" >> "$GITHUB_OUTPUT"
          echo "repo_api=$(echo "$OUTPUTS" | jq -r '.ecrRepoUrls.api')" >> "$GITHUB_OUTPUT"
          echo "repo_web=$(echo "$OUTPUTS" | jq -r '.ecrRepoUrls.web')" >> "$GITHUB_OUTPUT"
          echo "repo_chat=$(echo "$OUTPUTS" | jq -r '.ecrRepoUrls.chatService')" >> "$GITHUB_OUTPUT"
          echo "repo_ws=$(echo "$OUTPUTS" | jq -r '.ecrRepoUrls.wsServer')" >> "$GITHUB_OUTPUT"
          echo "repo_notification=$(echo "$OUTPUTS" | jq -r '.ecrRepoUrls.notification')" >> "$GITHUB_OUTPUT"
          echo "svc_api=$(echo "$OUTPUTS" | jq -r '.ecsServiceNames.api')" >> "$GITHUB_OUTPUT"
          echo "svc_chat=$(echo "$OUTPUTS" | jq -r '.ecsServiceNames.chatService')" >> "$GITHUB_OUTPUT"
          echo "svc_ws=$(echo "$OUTPUTS" | jq -r '.ecsServiceNames.wsServer')" >> "$GITHUB_OUTPUT"
          echo "svc_notification=$(echo "$OUTPUTS" | jq -r '.ecsServiceNames.notification')" >> "$GITHUB_OUTPUT"
          echo "svc_web=$(echo "$OUTPUTS" | jq -r '.ecsServiceNames.web')" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.pulumi.outputs.repo_api }}:latest
          build-args: |
            TURBO_TEAM=${{ vars.TURBO_TEAM }}
            TURBO_TOKEN=${{ secrets.TURBO_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.pulumi.outputs.repo_web }}:latest
          build-args: |
            TURBO_TEAM=${{ vars.TURBO_TEAM }}
            TURBO_TOKEN=${{ secrets.TURBO_TOKEN }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL }}
            NEXT_PUBLIC_BASE_URL=${{ vars.NEXT_PUBLIC_BASE_URL }}
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ vars.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}

      - name: Build and push chat-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/chat-service/Dockerfile
          push: true
          tags: ${{ steps.pulumi.outputs.repo_chat }}:latest
          build-args: |
            TURBO_TEAM=${{ vars.TURBO_TEAM }}
            TURBO_TOKEN=${{ secrets.TURBO_TOKEN }}

      - name: Build and push ws-server
        uses: docker/build-push-action@v6
        with:
          context: apps/ws-server
          file: apps/ws-server/Dockerfile
          push: true
          tags: ${{ steps.pulumi.outputs.repo_ws }}:latest

      - name: Build and push notification
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/notification/Dockerfile
          push: true
          tags: ${{ steps.pulumi.outputs.repo_notification }}:latest
          build-args: |
            TURBO_TEAM=${{ vars.TURBO_TEAM }}
            TURBO_TOKEN=${{ secrets.TURBO_TOKEN }}

      - name: Force ECS deployments
        run: |
          CLUSTER="${{ steps.pulumi.outputs.cluster }}"
          aws ecs update-service --cluster "$CLUSTER" --service "${{ steps.pulumi.outputs.svc_api }}" --force-new-deployment
          aws ecs update-service --cluster "$CLUSTER" --service "${{ steps.pulumi.outputs.svc_chat }}" --force-new-deployment
          aws ecs update-service --cluster "$CLUSTER" --service "${{ steps.pulumi.outputs.svc_ws }}" --force-new-deployment
          aws ecs update-service --cluster "$CLUSTER" --service "${{ steps.pulumi.outputs.svc_notification }}" --force-new-deployment
          aws ecs update-service --cluster "$CLUSTER" --service "${{ steps.pulumi.outputs.svc_web }}" --force-new-deployment
